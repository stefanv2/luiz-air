<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>GLOBAL SURVEILLANCE - LUIZ-DEFENSE</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&family=Black+Ops+One&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --sec-neon: #00ff00;
      --sec-orange: #ff4d00;
      --sec-red: #ff0000;
      --sec-blue: #00e5ff;
      --bg: #0a0a0a;
      --border: #333;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Courier Prime', monospace;
      background-color: var(--bg);
      background-image: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
      color: var(--sec-neon);
      min-height: 100vh;
      overflow-x: hidden;
    }

    header { border-bottom: 2px solid var(--sec-neon); padding: 16px 0; background: #000; }
    .wrap { max-width: 1300px; margin: 0 auto; padding: 0 20px; }
    .header-content { display: flex; justify-content: space-between; align-items: center; }
    .brand { display: flex; align-items: center; gap: 12px; font-family: 'Black Ops One'; font-size: 24px; color: var(--sec-neon); text-decoration: none; }

    /* MODE SELECTOR */
    .mode-selector { display: flex; gap: 15px; justify-content: center; margin-top: 30px; margin-bottom: 10px; flex-wrap: wrap; }
    .btn-mode { background: #000; border: 2px solid #444; color: #888; padding: 12px 25px; font-family: 'Black Ops One'; cursor: pointer; transition: 0.3s; border-radius: 4px; }
    .btn-mode.active { border-color: var(--sec-neon); color: var(--sec-neon); box-shadow: 0 0 15px rgba(0,255,0,0.2); }
    .btn-intel { border-color: var(--sec-blue); color: var(--sec-blue); text-decoration: none; }

    /* REGION SELECTOR */
    .region-switcher { display: flex; gap: 8px; justify-content: center; margin-bottom: 30px; min-height: 45px; flex-wrap: wrap; }
    .btn-region { background: #111; color: #555; border: 1px solid #333; padding: 8px 15px; font-family: 'Courier Prime'; cursor: pointer; transition: 0.3s; font-size: 12px; font-weight: bold; }
    .btn-region.active { color: var(--sec-orange); border-color: var(--sec-orange); }

    /* CCTV GRID */
    .cctv-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-bottom: 20px; }
    @media (max-width: 900px) { .cctv-grid { grid-template-columns: 1fr; } }
    .small-cams { display: grid; grid-template-rows: 1fr 1fr; gap: 20px; }

    .cam-box { background: #000; border: 2px solid var(--border); position: relative; border-radius: 8px; overflow: hidden; min-height: 300px; display: flex; align-items: center; justify-content: center; }
    .cam-box.main-cam { min-height: 600px; border-color: var(--sec-neon); }
    .cam-box iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; filter: grayscale(5%) contrast(105%); opacity: 0; transition: opacity 1s; }
    .cam-box.active iframe { opacity: 1; }

    .hud-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; border: 1px solid rgba(0,255,0,0.1); opacity: 0; transition: opacity 0.5s; }
    .cam-box.active .hud-overlay { opacity: 1; }
    
    .cam-name { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); padding: 6px 15px; border: 1px solid var(--sec-neon); font-size: 13px; font-weight: bold; z-index: 15; white-space: nowrap; }
    .rec-indicator { position: absolute; bottom: 15px; left: 15px; color: var(--sec-red); font-weight: bold; font-size: 14px; animation: blink 1s infinite; z-index: 15; }
    .cam-data { position: absolute; bottom: 15px; right: 15px; font-size: 11px; background: rgba(0,0,0,0.7); padding: 8px; border-right: 2px solid var(--sec-neon); text-align: right; z-index: 15; }

    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }

    /* WORLD CLOCK */
    .world-clock-bar { grid-column: span 2; background: #000; border: 1px solid #222; border-left: 4px solid var(--sec-orange); display: flex; justify-content: space-around; padding: 25px 15px; position: relative; overflow: hidden; opacity: 0; transition: opacity 1s; }
    .cctv-grid.active .world-clock-bar { opacity: 1; }
    .world-map-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-image: url('https://upload.wikimedia.org/wikipedia/commons/8/80/World_map_blank_without_borders.svg'); background-size: contain; background-repeat: no-repeat; background-position: center; opacity: 0.1; filter: invert(1) sepia(1) saturate(5) hue-rotate(70deg); pointer-events: none; }
    .clock-item { text-align: center; z-index: 2; }
    .clock-label { font-size: 10px; color: #666; margin-bottom: 5px; }
    .clock-time { font-size: 18px; font-weight: bold; color: var(--sec-neon); }

    .controls { display: flex; gap: 15px; justify-content: center; padding: 20px; background: #050505; border-radius: 8px; margin-bottom: 40px; margin-top: 20px; }
    .btn-action { background: #000; color: var(--sec-neon); border: 1px solid var(--sec-neon); padding: 12px 24px; font-family: 'Black Ops One'; cursor: pointer; }

    .standby-overlay { position: absolute; font-family: 'Courier Prime'; font-size: 20px; color: var(--sec-red); animation: blink 1s infinite; z-index: 20; }
  </style>
</head>
<body>

  <header>
    <div class="wrap header-content">
      <a href="security.html" class="brand">LUIZ-DEFENSE</a>
      <nav style="display:flex; gap:15px; align-items:center;">
  <button onclick="toggleMusic()" id="music-btn" style="background:none; border:1px solid var(--sec-blue); color:var(--sec-blue); font-family:'Courier Prime'; cursor:pointer; font-size:12px; padding: 4px 10px; border-radius:4px;">🔊 AUDIO: OFF</button>
  <a href="security.html" style="color:#888; text-decoration:none; font-weight:bold;">⬅ BACK</a>
</nav>
    </div>
  </header>

  <main class="wrap">
    
    <div class="mode-selector">
      <button id="mode-sat" class="btn-mode" onclick="initSystem('SAT')">📡 SATELLITE</button>
      <button id="mode-air" class="btn-mode" onclick="initSystem('AIR')">✈️ AIRFLOW</button>
      <button id="mode-sea" class="btn-mode" onclick="initSystem('SEA')">🚢 MARITIME</button>
      <a href="deep-intelligence.html" style="text-decoration:none;">
        <button class="btn-mode btn-intel">🧬 DEEP INTEL</button>
      <a href="intel-signals.html" style="text-decoration:none;">
        <button class="btn-mode btn-intel">🧬 SIGINT OPS</button>

        
      </a>
    </div>

    <div id="region-bar" class="region-switcher"></div>

    <div id="cctv-grid" class="cctv-grid">
      <div id="cam-main" class="cam-box main-cam">
        <div class="standby-overlay">>> STANDBY</div>
        <iframe id="map-main-iframe" src=""></iframe>
        <div class="hud-overlay">
          <div class="cam-name" id="name-main">SYSTEM BOOTING...</div>
          <div class="rec-indicator">● REC</div>
          <div class="cam-data">
            UPLINK: ACTIVE<br>
            COORDS: <span id="coords-main">--.---- / --.----</span>
          </div>
        </div>
      </div>

      <div class="small-cams">
        <div id="cam-sub1" class="cam-box">
          <div class="standby-overlay">>> STANDBY</div>
          <iframe id="map-sub1-iframe" src=""></iframe>
          <div class="hud-overlay">
            <div class="cam-name" id="name-sub1">SCANNER 1</div>
          </div>
        </div>
        <div id="cam-sub2" class="cam-box">
          <div class="standby-overlay">>> STANDBY</div>
          <iframe id="map-sub2-iframe" src=""></iframe>
          <div class="hud-overlay">
            <div class="cam-name" id="name-sub2">SCANNER 2</div>
          </div>
        </div>
      </div>

      <div class="world-clock-bar">
        <div class="world-map-bg"></div>
        <div class="clock-item"><div class="clock-label">LONDON</div><div class="clock-time" id="clock-london">00:00</div></div>
        <div class="clock-item"><div class="clock-label">NEW YORK</div><div class="clock-time" id="clock-ny">00:00</div></div>
        <div class="clock-item"><div class="clock-label">DUBAI</div><div class="clock-time" id="clock-dubai">00:00</div></div>
        <div class="clock-item"><div class="clock-label">LOCAL</div><div class="clock-time" id="clock-local">00:00</div></div>
      </div>
    </div>

    <div class="controls">
      <button class="btn-action" onclick="speak('Re-scanning global sectors')">📡 RE-SCAN</button>
      <button class="btn-action" style="border-color:red; color:red;" onclick="speak('Warning. DEFCON 2 authorized.')">🚨 ALERT</button>
    </div>
  </main>

  <script>
    const allData = {
      'SAT': {
        'EUROPE': { m:'https://embed.windy.com/embed.html?type=map&location=coordinates&zoom=4&overlay=wind&lat=52.3&lon=4.9', s1:'https://embed.windy.com/embed.html?type=map&location=coordinates&zoom=5&overlay=radar&lat=52.3&lon=4.9', s2:'https://embed.windy.com/embed.html?type=map&location=coordinates&zoom=4&overlay=clouds&lat=52.3&lon=4.9', name:'SAT: EUROPE', coords:'52.36N / 4.89E', voice:'Switching to Europe sector.' },
        'NORTH AMERICA': { m:'https://embed.windy.com/embed.html?type=map&location=coordinates&zoom=4&overlay=wind&lat=40.7&lon=-74.0', s1:'https://embed.windy.com/embed.html?type=map&location=coordinates&zoom=4&overlay=radar&lat=40.7&lon=-74.0', s2:'https://embed.windy.com/embed.html?type=map&location=coordinates&zoom=3&overlay=clouds&lat=40.7&lon=-74.0', name:'SAT: NORTH AMERICA', coords:'40.71N / 74.00W', voice:'Repositioning to North American sector.' },
        'SOUTH AMERICA': { m:'https://embed.windy.com/embed.html?type=map&location=coordinates&zoom=4&overlay=wind&lat=-23.5&lon=-46.6', s1:'https://embed.windy.com/embed.html?type=map&location=coordinates&zoom=4&overlay=radar&lat=-23.5&lon=-46.6', s2:'https://embed.windy.com/embed.html?type=map&location=coordinates&zoom=4&overlay=clouds&lat=-15.7&lon=-47.9', name:'SAT: SOUTH AMERICA', coords:'23.55S / 46.63W', voice:'Scanning South American sector. Deep forest imaging active.' },
        'SPACE/DEEP ORBIT': { 
            m:'https://embed.windy.com/embed.html?type=map&location=coordinates&zoom=2&overlay=satellite&product=satellite&level=surface&lat=15&lon=10', 
            s1:'https://embed.windy.com/embed.html?type=map&location=coordinates&zoom=2&overlay=clouds&lat=0&lon=0', 
            s2:'https://embed.windy.com/embed.html?type=map&location=coordinates&zoom=2&overlay=temp&lat=0&lon=0', 
            name:'GLOBAL SATELLITE INTERCEPT', coords:'ALT: 35,786KM', voice:'Accessing global EUMETSAT network.' 
        }
      },
      'AIR': {
        'AMSTERDAM': { m:'https://globe.adsbexchange.com/?hideFrame=1&lat=52.30&lon=4.76&zoom=8', s1:'https://embed.windy.com/embed.html?type=map&location=coordinates&zoom=7&overlay=wind&lat=52.30&lon=4.76', s2:'https://embed.windy.com/embed.html?type=map&location=coordinates&zoom=8&overlay=radar&lat=52.30&lon=4.76', name:'AIR: AMSTERDAM SECTOR', coords:'52.30N / 4.76E', voice:'Zooming in on Amsterdam sector.' },
        'EUROPE': { m:'https://globe.adsbexchange.com/?hideFrame=1&lat=52.2&lon=4.9&zoom=5', s1:'https://embed.windy.com/embed.html?type=map&location=coordinates&zoom=6&overlay=wind&lat=52.2&lon=4.9', s2:'https://embed.windy.com/embed.html?type=map&location=coordinates&zoom=6&overlay=radar&lat=52.2&lon=4.9', name:'AIR: EUROPEAN SECTOR', coords:'52.36N / 4.89E', voice:'Monitoring European airspace.' },
        'MIDDLE EAST': { m:'https://globe.adsbexchange.com/?hideFrame=1&lat=25.2&lon=55.3&zoom=6', s1:'https://embed.windy.com/embed.html?type=map&location=coordinates&zoom=5&overlay=wind&lat=25.2&lon=55.3', s2:'https://embed.windy.com/embed.html?type=map&location=coordinates&zoom=6&overlay=radar&lat=25.2&lon=55.3', name:'AIR: MIDDLE EAST SECTOR', coords:'25.20N / 55.30E', voice:'Monitoring Middle Eastern flight corridors. Dubai and Doha radar active.' },
        'GLOBAL': { m:'https://globe.adsbexchange.com/?hideFrame=1&zoom=2', s1:'https://embed.windy.com/embed.html?type=map&location=coordinates&zoom=4&overlay=wind&lat=50&lon=0', s2:'https://embed.windy.com/embed.html?type=map&location=coordinates&zoom=5&overlay=radar&lat=50&lon=0', name:'AIR: GLOBAL TRAFFIC', coords:'ADS-B ACTIVE', voice:'Accessing global airflow network.' }
      },
      'SEA': {
        'EUROPE': { m:'https://www.vesselfinder.com/aismap?zoom=6&lat=52&lon=4&names=false', s1:'https://embed.windy.com/embed.html?type=map&location=coordinates&zoom=5&overlay=waves&lat=52&lon=4', s2:'https://www.vesselfinder.com/aismap?zoom=10&lat=51.9&lon=4.1&names=false', name:'SEA: NORTH SEA / ROTTERDAM', coords:'52.00N / 4.00E', voice:'Establishing maritime uplink for European ports.' },
        'CENTRAL AMERICA': { m:'https://www.vesselfinder.com/aismap?zoom=5&lat=15.0&lon=-80.0&names=false', s1:'https://embed.windy.com/embed.html?type=map&location=coordinates&zoom=5&overlay=wind&lat=15.0&lon=-80.0', s2:'https://www.vesselfinder.com/aismap?zoom=9&lat=9.1&lon=-79.7&names=false', name:'SEA: CARIBBEAN / PANAMA', coords:'STRATEGIC CHOKEPOINTS', voice:'Establishing Central American surveillance. Monitoring Panama Canal access.' },
        'MIDDLE EAST': { m:'https://www.vesselfinder.com/aismap?zoom=6&lat=25.5&lon=55.5&names=false', s1:'https://embed.windy.com/embed.html?type=map&location=coordinates&zoom=5&overlay=wind&lat=25&lon=55', s2:'https://www.vesselfinder.com/aismap?zoom=8&lat=29.9&lon=32.5&names=false', name:'SEA: HORMUZ / SUEZ', coords:'STRATEGIC NODES', voice:'Tracking vessel traffic in the Middle East corridors.' },
        'ASIA': { m:'https://www.vesselfinder.com/aismap?zoom=7&lat=1.2&lon=103.8&names=false', s1:'https://embed.windy.com/embed.html?type=map&location=coordinates&zoom=4&overlay=radar&lat=10&lon=110', s2:'https://www.vesselfinder.com/aismap?zoom=9&lat=22.3&lon=114.1&names=false', name:'SEA: MALACCA / HK', coords:'SINGAPORE HUB', voice:'Establishing Asian maritime surveillance.' },
        'SOUTH AMERICA': { m:'https://www.vesselfinder.com/aismap?zoom=5&lat=-23.9&lon=-46.3&names=false', s1:'https://embed.windy.com/embed.html?type=map&location=coordinates&zoom=5&overlay=waves&lat=1.0&lon=-45.0', s2:'https://www.vesselfinder.com/aismap?zoom=7&lat=-34.6&lon=-58.4&names=false', name:'SEA: BRAZIL / ARGENTINA', coords:'SANTOS & BUENOS AIRES', voice:'Repositioning to South American maritime sectors.' }
      }
    };

    let isSystemInit = false;

    function initSystem(mode) {
        if (!isSystemInit) {
            isSystemInit = true;
            document.querySelectorAll('.standby-overlay').forEach(el => el.remove());
            document.getElementById('cctv-grid').classList.add('active');
            document.querySelectorAll('.cam-box').forEach(box => box.classList.add('active'));
            speak("System activated. Welcome Commander Luiz.");
        }
        setMode(mode);
    }

    function setMode(mode) {
      document.querySelectorAll('.btn-mode').forEach(b => b.classList.remove('active'));
      const modeBtn = document.getElementById('mode-' + mode.toLowerCase());
      if(modeBtn) modeBtn.classList.add('active');
      
      const regionBar = document.getElementById('region-bar');
      regionBar.innerHTML = '';
      
      const regions = Object.keys(allData[mode]);
      regions.forEach((reg, index) => {
        const btn = document.createElement('button');
        btn.className = 'btn-region' + (index === 0 ? ' active' : '');
        btn.innerText = reg;
        btn.onclick = () => {
          document.querySelectorAll('.btn-region').forEach(rb => rb.classList.remove('active'));
          btn.classList.add('active');
          updateCams(mode, reg);
        };
        regionBar.appendChild(btn);
      });
      
      updateCams(mode, regions[0]);
    }

    function updateCams(mode, reg) {
      const d = allData[mode][reg];
      document.getElementById('map-main-iframe').src = d.m;
      document.getElementById('map-sub1-iframe').src = d.s1;
      document.getElementById('map-sub2-iframe').src = d.s2;
      document.getElementById('name-main').innerText = d.name;
      document.getElementById('coords-main').innerText = d.coords;
      if(d.voice) speak(d.voice);
    }

    function speak(t) {
      if ('speechSynthesis' in window && isSystemInit) {
        window.speechSynthesis.cancel();
        let u = new SpeechSynthesisUtterance(t);
        u.lang = 'en-US'; 
        u.pitch = 0.9; 
        u.rate = 1.1; 
        window.speechSynthesis.speak(u);
      }
    }

    function updateClocks() {
      const o = { hour:'2-digit', minute:'2-digit', hour12:false };
      document.getElementById('clock-london').innerText = new Intl.DateTimeFormat('en-GB', { ...o, timeZone:'Europe/London' }).format(new Date());
      document.getElementById('clock-ny').innerText = new Intl.DateTimeFormat('en-US', { ...o, timeZone:'America/New_York' }).format(new Date());
      document.getElementById('clock-dubai').innerText = new Intl.DateTimeFormat('en-AE', { ...o, timeZone:'Asia/Dubai' }).format(new Date());
      document.getElementById('clock-local').innerText = new Intl.DateTimeFormat('nl-NL', o).format(new Date());
    }

    setInterval(updateClocks, 1000);
    updateClocks();
    
    window.onload = () => {
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        function playBootSound() {
            const osc = audioContext.createOscillator();
            const g = audioContext.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(45, audioContext.currentTime);
            g.gain.setValueAtTime(0.2, audioContext.currentTime);
            g.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 2);
            osc.connect(g); g.connect(audioContext.destination);
            osc.start(); osc.stop(audioContext.currentTime + 2);
        }
        playBootSound();
    };
  </script>
<script>
  let musicPlaying = false;
  // Dit is een rustige Space Ambient track (SoundHelix 8 is erg 'ISS-achtig')
  const ambientAudio = new Audio('https://www.soundhelix.com/examples/mp3/SoundHelix-Song-17.mp3'); 
  ambientAudio.loop = true;
  ambientAudio.volume = 0.2; // Zacht op de achtergrond

  function toggleMusic() {
    const btn = document.getElementById('music-btn');
    if (!musicPlaying) {
      ambientAudio.play().catch(e => console.log("Audio play blocked until user interaction."));
      btn.innerText = "🔊 AUDIO: ON";
      btn.style.color = "var(--sec-neon)";
      btn.style.borderColor = "var(--sec-neon)";
      if(typeof speak === "function") speak("Deep space ambient uplink established.");
    } else {
      ambientAudio.pause();
      btn.innerText = "🔊 AUDIO: OFF";
      btn.style.color = "var(--sec-blue)";
      btn.style.borderColor = "var(--sec-blue)";
      if(typeof speak === "function") speak("Audio uplink terminated.");
    }
    musicPlaying = !musicPlaying;
  }
</script>
</body>
</html>
